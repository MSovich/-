<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Галерея артов - VTuber Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .gallery-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-6px);
            border-color: var(--accent-color);
        }
        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .gallery-item .caption {
            padding: 12px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid var(--border-color);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--accent-color);
        }
        .back-link::before {
            content: '← ';
        }

        .modal-overlay.lightbox {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }
        .lightbox-content {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .lightbox-content .caption {
            margin-top: 15px;
            color: var(--text-main);
            font-size: 18px;
            text-align: center;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            line-height: 1;
        }
        .lightbox-close:hover {
            color: var(--accent-color);
        }
        .lightbox-nav {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .lightbox-nav button {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .lightbox-nav button:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .gallery-item img {
                height: 160px;
            }
            .lightbox-content img {
                max-height: 60vh;
            }
        }
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .gallery-item img {
                height: 130px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><div class="logo-dot"></div>VTUBER HUB</a>
            <button class="nav-toggle" aria-label="Меню">☰</button>
            <nav></nav>
        </div>
    </header>
    <main>
        <a href="#" class="back-link" id="backLink">Назад к втуберу</a>
        <h2 id="galleryTitle" class="section-title reveal-up">Галерея артов</h2>

        <div class="gallery-grid" id="galleryGrid"></div>

        <div class="modal-overlay lightbox" id="lightbox">
            <div class="lightbox-content">
                <button class="lightbox-close" id="lightboxClose">&times;</button>
                <img id="lightboxImg" src="" alt="">
                <div class="caption" id="lightboxCaption"></div>
                <div class="lightbox-nav">
                    <button id="lightboxPrev">◀ Предыдущий</button>
                    <button id="lightboxNext">Следующий ▶</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>Контакты для связи: support@vtuberhub.com | Telegram: @vtuberhub_support</p>
        <p style="margin-top: 10px; font-size: 12px; color: #555;">© 2026 VTuber Hub. Все права защищены.</p>
    </footer>
    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const streamerId = urlParams.get('id');

        const grid = document.getElementById('galleryGrid');
        const title = document.getElementById('galleryTitle');
        const backLink = document.getElementById('backLink');

        let currentArts = [];
        let currentIndex = 0;

        function loadGallery() {
            const vtubers = getVtubers();
            const vtuber = vtubers.find(v => v.id === streamerId);

            if (!vtuber) {
                title.textContent = 'Втубер не найден';
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px 0;">Такого втубера не существует.</p>';
                backLink.style.display = 'none';
                return;
            }

            title.textContent = `Галерея артов: ${vtuber.name}`;
            backLink.href = `vtuber.html?id=${streamerId}`;

            const allArts = getArts();
            const arts = allArts.filter(a => a.streamerId === streamerId);

            if (arts.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px 0;">Артов пока нет.</p>';
                return;
            }

            currentArts = arts;

            grid.innerHTML = arts.map((art, index) => `
                <div class="gallery-item reveal-up" data-index="${index}">
                    <img src="${art.imageUrl}" alt="${art.caption || 'Арт'}">
                    <div class="caption">${art.caption || 'Без названия'}</div>
                </div>
            `).join('');

            document.querySelectorAll('.gallery-item').forEach(item => {
                item.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    openLightbox(idx);
                });
            });
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const closeBtn = document.getElementById('lightboxClose');
        const prevBtn = document.getElementById('lightboxPrev');
        const nextBtn = document.getElementById('lightboxNext');

        function openLightbox(index) {
            if (currentArts.length === 0) return;
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const art = currentArts[currentIndex];
            if (!art) return;
            lightboxImg.src = art.imageUrl;
            lightboxImg.alt = art.caption || 'Арт';
            lightboxCaption.textContent = art.caption || 'Без названия';
        }

        function prevImage() {
            if (currentArts.length === 0) return;
            currentIndex = (currentIndex - 1 + currentArts.length) % currentArts.length;
            updateLightbox();
        }

        function nextImage() {
            if (currentArts.length === 0) return;
            currentIndex = (currentIndex + 1) % currentArts.length;
            updateLightbox();
        }

        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });
        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);

        window.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
