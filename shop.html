<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Официальный Мерч-Магазин - VTuber Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ---- ОСНОВНЫЕ СТИЛИ ---- */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-3px);
            border-color: #444;
        }
        .product-img {
            height: 200px;
            background-color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .product-desc {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            gap: 10px;
        }
        .product-price {
            font-weight: 700;
            font-size: 16px;
        }
        .size-select {
            background-color: #222;
            border: 1px solid var(--border-color);
            color: white;
            font-size: 12px;
            padding: 5px 3px;
            border-radius: 4px;
            outline: none;
            margin-bottom: 10px;
            width: 100%;
            pointer-events: auto;
        }
        .buy-btn {
            background-color: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: 600;
            pointer-events: auto;
            text-align: center;
        }
        .buy-btn:hover {
            background-color: var(--accent-hover);
        }
        .product-card * {
            pointer-events: none;
        }
        .product-card .buy-btn,
        .product-card .size-select {
            pointer-events: auto;
        }

        /* ---- НОВЫЙ ФИЛЬТР С ПРОКРУТКОЙ И СТАТИЧНЫМИ КНОПКАМИ ---- */
        .filter-dropdown {
            position: relative;
            margin-bottom: 20px;
        }
        .filter-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0D0D0D;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            transition: border-color 0.3s ease;
            width: 100%;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            user-select: none;
        }
        .filter-toggle:hover {
            border-color: #444;
        }
        .filter-toggle .burger-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 20px;
            flex-shrink: 0;
        }
        .filter-toggle .burger-icon span {
            display: block;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .filter-toggle .burger-icon span:nth-child(2) {
            width: 80%;
        }
        .filter-toggle .arrow {
            margin-left: auto;
            transition: transform 0.3s ease;
            font-size: 16px;
        }
        .filter-toggle.open .arrow {
            transform: rotate(180deg);
        }
        .filter-panel {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 50;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            min-width: 220px;
            max-height: 420px;
            display: flex;
            flex-direction: column;
        }
        .filter-panel.open {
            display: flex;
        }

        /* Контейнер с чекбоксами (скролл) */
        .filter-options {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            max-height: 260px;
        }
        .filter-options::-webkit-scrollbar {
            width: 4px;
        }
        .filter-options::-webkit-scrollbar-track {
            background: transparent;
        }
        .filter-options::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        .filter-options::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .filter-option:hover {
            background: #1A1A1A;
        }
        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
            flex-shrink: 0;
        }
        .filter-option label {
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
            flex: 1;
        }

        /* Разделитель между списком и кнопками */
        .filter-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0;
        }

        /* Кнопки статичны (закреплены внизу) */
        .filter-actions {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .filter-actions button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .filter-actions .filter-reset {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        .filter-actions .filter-reset:hover {
            border-color: var(--accent-color);
            color: var(--text-main);
            background: rgba(230, 57, 70, 0.05);
        }
        .filter-actions .filter-apply {
            background: var(--accent-color);
            color: white;
        }
        .filter-actions .filter-apply:hover {
            background: var(--accent-hover);
        }

        .filter-count {
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 700;
            min-width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }

        /* ---- ПЛАНШЕТЫ (до 1024px) ---- */
        @media (max-width: 1024px) {
            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
        }

        /* ---- МОБИЛЬНЫЕ ТЕЛЕФОНЫ (до 768px) ---- */
        @media (max-width: 768px) {
            body { overflow-x: hidden; }
            main { padding: 15px 10px !important; max-width: 100% !important; }
            .two-column-layout { display: block !important; width: 100%; }

            .sidebar {
                width: 100% !important;
                padding: 10px 8px !important;
                margin-bottom: 15px;
                position: static !important;
                border-radius: 8px;
            }
            .sidebar .search-bar {
                font-size: 16px;
                padding: 10px 12px;
                margin-bottom: 12px;
                width: 100%;
                box-sizing: border-box;
            }

            .filter-toggle {
                padding: 10px 14px;
                font-size: 14px;
            }
            .filter-panel {
                max-height: 380px;
                min-width: unset;
                left: 0;
                right: 0;
            }
            .filter-options {
                max-height: 220px;
                padding: 10px 12px;
            }
            .filter-option {
                padding: 10px 4px;
            }
            .filter-option label {
                font-size: 15px;
            }
            .filter-option input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            .filter-actions {
                padding: 10px 12px;
            }
            .filter-actions button {
                padding: 12px;
                font-size: 15px;
            }

            .shop-grid {
                display: flex;
                flex-direction: column;
                gap: 14px;
                width: 100%;
            }
            .product-card {
                flex-direction: row;
                align-items: stretch;
                border-radius: 10px;
                width: 100%;
                min-height: 120px;
            }
            .product-img {
                width: 130px;
                min-height: 130px;
                height: auto;
                flex-shrink: 0;
            }
            .product-img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .product-info {
                padding: 10px 12px;
                justify-content: space-between;
                flex: 1;
                min-width: 0;
            }
            .product-title { font-size: 15px; margin-bottom: 3px; }
            .product-desc {
                font-size: 12px;
                margin-bottom: 6px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .size-select { font-size: 14px; padding: 6px 4px; margin-bottom: 5px; }
            .buy-btn { font-size: 14px; padding: 8px 10px; min-height: 38px; }
            .product-price { font-size: 16px; }
            .product-price-row { flex-wrap: wrap; gap: 6px; }
            .product-price-row .buy-btn { flex: 1 1 100%; }
        }

        /* ---- ОЧЕНЬ МАЛЕНЬКИЕ ТЕЛЕФОНЫ (до 480px) ---- */
        @media (max-width: 480px) {
            main { padding: 10px 6px !important; }
            .sidebar { padding: 8px 5px !important; }
            .filter-toggle { padding: 8px 12px; font-size: 13px; }
            .filter-panel { max-height: 340px; }
            .filter-options { max-height: 180px; padding: 8px 10px; }
            .filter-option { padding: 8px 2px; }
            .filter-option label { font-size: 14px; }
            .filter-actions { padding: 8px 10px; }
            .filter-actions button { padding: 10px; font-size: 14px; }

            .product-card { min-height: 100px; border-radius: 8px; }
            .product-img { width: 100px; min-height: 100px; }
            .product-info { padding: 8px 10px; }
            .product-title { font-size: 14px; }
            .product-desc { font-size: 11px; -webkit-line-clamp: 2; }
            .size-select { font-size: 13px; padding: 5px 3px; }
            .buy-btn { font-size: 13px; padding: 6px 8px; min-height: 34px; }
            .product-price { font-size: 15px; }
        }

        /* ---- ПЛАНШЕТЫ В ЛАНДШАФТЕ ---- */
        @media (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .shop-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .product-img { height: 180px; }
        }
        @media (min-width: 1024px) and (max-width: 1366px) and (orientation: portrait) {
            .shop-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><div class="logo-dot"></div>VTUBER HUB</a>
            <button class="nav-toggle" aria-label="Меню">☰</button>
            <nav></nav>
        </div>
    </header>
    <main>
        <div class="two-column-layout">
            <div class="sidebar">
                <input type="text" class="search-bar" placeholder="Поиск мерча..." id="shop-search" oninput="filterShop()">

                <!-- ФИЛЬТР С ПРОКРУТКОЙ И СТАТИЧНЫМИ КНОПКАМИ -->
                <div class="filter-dropdown" id="filterDropdown">
                    <div class="filter-toggle" id="filterToggle">
                        <span class="burger-icon">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                        <span>Фильтр по стримерам</span>
                        <span class="filter-count" id="filterCount">0</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="filter-panel" id="filterPanel">
                        <div class="filter-options" id="filterOptions"></div>
                        <hr class="filter-divider">
                        <div class="filter-actions">
                            <button class="filter-reset" id="filterReset">Сбросить все</button>
                            <button class="filter-apply" id="filterApply">Применить</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="shop-grid" id="shop-products-grid"></div>
        </div>
    </main>

    <!-- Модальное окно заказа -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Подтверждение заказа</div>
                <button class="modal-close" onclick="closeOrderModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="orderModalText">Вы выбрали товар: <span class="highlight"></span></p>
                <p id="orderModalSize">Размер: <span class="highlight"></span></p>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">Нажмите «Перейти в Telegram», чтобы скопировать заказ и открыть чат.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeOrderModal()">Отмена</button>
                <button class="btn-primary" id="orderModalConfirm">Перейти в Telegram</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Контакты для связи: support@vtuberhub.com | Telegram: @vtuberhub_support</p>
        <p style="margin-top: 10px; font-size: 12px; color: #555;">© 2026 VTuber Hub. Все права защищены.</p>
    </footer>
    <script src="app.js"></script>
    <script>
        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        let selectedStreamers = new Set();

        // ---------- ОТРИСОВКА ЧЕКБОКСОВ ----------
        function renderFilterCheckboxes() {
            const vtubers = getVtubers();
            const container = document.getElementById('filterOptions');
            container.innerHTML = '';
            vtubers.forEach(v => {
                const div = document.createElement('div');
                div.className = 'filter-option';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `filter-${v.id}`;
                checkbox.value = v.id;
                checkbox.checked = selectedStreamers.has(v.id);
                const label = document.createElement('label');
                label.htmlFor = `filter-${v.id}`;
                label.textContent = v.name;
                div.appendChild(checkbox);
                div.appendChild(label);
                container.appendChild(div);
            });
        }

        // ---------- ОБНОВЛЕНИЕ СЧЁТЧИКА ----------
        function updateFilterCount() {
            const count = selectedStreamers.size;
            document.getElementById('filterCount').textContent = count;
        }

        // ---------- УПРАВЛЕНИЕ ПАНЕЛЬЮ ----------
        function toggleFilterPanel(open) {
            const panel = document.getElementById('filterPanel');
            const toggle = document.getElementById('filterToggle');
            if (open === undefined) {
                panel.classList.toggle('open');
                toggle.classList.toggle('open');
            } else if (open) {
                panel.classList.add('open');
                toggle.classList.add('open');
            } else {
                panel.classList.remove('open');
                toggle.classList.remove('open');
            }
        }

        function closeFilterPanel() {
            toggleFilterPanel(false);
        }

        function initFilterDropdown() {
            const toggle = document.getElementById('filterToggle');
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleFilterPanel();
            });
            document.addEventListener('click', function(e) {
                const dropdown = document.getElementById('filterDropdown');
                if (dropdown && !dropdown.contains(e.target)) {
                    closeFilterPanel();
                }
            });
        }

        // ---------- ПРИМЕНЕНИЕ ФИЛЬТРА ----------
        function applyFilter() {
            const checked = document.querySelectorAll('#filterOptions input[type="checkbox"]:checked');
            selectedStreamers.clear();
            checked.forEach(cb => {
                selectedStreamers.add(cb.value);
            });
            updateFilterCount();
            renderProducts();
            closeFilterPanel();  // <- ЗАКРЫВАЕМ ПАНЕЛЬ
        }

        function resetFilter() {
            document.querySelectorAll('#filterOptions input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            selectedStreamers.clear();
            updateFilterCount();
            renderProducts();
            closeFilterPanel();  // <- ЗАКРЫВАЕМ ПАНЕЛЬ
        }

        // ---------- ФИЛЬТРАЦИЯ ТОВАРОВ ----------
        function renderProducts() {
            const products = getProducts();
            const grid = document.getElementById('shop-products-grid');
            const searchVal = document.getElementById('shop-search').value.toLowerCase();

            const filtered = products.filter(p => {
                const matchesStreamer = selectedStreamers.size === 0 || selectedStreamers.has(p.vtuberId);
                const matchesSearch = p.title.toLowerCase().includes(searchVal) || p.desc.toLowerCase().includes(searchVal);
                return matchesStreamer && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 30px 0;">Товары не найдены</p>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card" data-id="${p.id}" onclick="goToProduct(${p.id})">
                    <div class="product-img"><img src="${p.photo}" alt="${p.title}"></div>
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-desc">${p.desc}</div>
                        <select class="size-select" id="size-select-${p.id}" onclick="event.stopPropagation();">
                            <option value="S">Размер: S</option>
                            <option value="M">Размер: M</option>
                            <option value="L">Размер: L</option>
                            <option value="XL">Размер: XL</option>
                        </select>
                        <div class="product-price-row">
                            <span class="product-price">${p.price} ₽</span>
                            <button class="buy-btn" onclick="buyProduct(${p.id}, event)">Купить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterShop() {
            renderProducts();
        }

        function goToProduct(id) {
            window.location.href = `product.html?id=${id}`;
        }

        // ---------- МОДАЛЬНОЕ ОКНО ЗАКАЗА ----------
        function openOrderModal(product, size) {
            const modal = document.getElementById('orderModal');
            document.getElementById('orderModalText').innerHTML = 
                `Вы выбрали товар: <span class="highlight">${product.title}</span>`;
            document.getElementById('orderModalSize').innerHTML = 
                `Размер: <span class="highlight">${size}</span>`;
            modal.dataset.productId = product.id;
            modal.dataset.size = size;
            modal.classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeOrderModal();
        });

        document.getElementById('orderModalConfirm').addEventListener('click', function() {
            const modal = document.getElementById('orderModal');
            const productId = parseInt(modal.dataset.productId);
            const size = modal.dataset.size;
            const product = getProducts().find(p => p.id === productId);
            if (!product) return;
            const message = `Хочу заказать товар: ${product.title}, размер: ${size}`;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(message).then(() => {
                    window.open('https://web.telegram.org/a/#8320234702', '_blank');
                    closeOrderModal();
                }).catch(() => {
                    alert('Скопируйте текст: ' + message);
                    window.open('https://web.telegram.org/a/#8320234702', '_blank');
                    closeOrderModal();
                });
            } else {
                alert('Скопируйте текст: ' + message);
                window.open('https://web.telegram.org/a/#8320234702', '_blank');
                closeOrderModal();
            }
        });

        function buyProduct(productId, event) {
            if (event) event.stopPropagation();
            const product = getProducts().find(p => p.id === productId);
            if (!product) return;
            const sizeSelect = document.getElementById(`size-select-${productId}`);
            const size = sizeSelect ? sizeSelect.value : 'M';
            openOrderModal(product, size);
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const streamerParam = urlParams.get('streamer');
            if (streamerParam) {
                selectedStreamers.add(streamerParam);
            }

            renderFilterCheckboxes();
            updateFilterCount();
            initFilterDropdown();

            document.getElementById('filterReset').addEventListener('click', resetFilter);
            document.getElementById('filterApply').addEventListener('click', applyFilter);

            renderProducts();
        });
    </script>
</body>
</html>
