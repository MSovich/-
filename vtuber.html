<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Втубер - VTuber Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .vtuber-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        .vtuber-photo {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            background: #1A1A1A;
        }
        .vtuber-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vtuber-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .vtuber-name-big {
            font-size: 36px;
            font-weight: 800;
        }
        .vtuber-desc-big {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .social-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .social-btn {
            background: #222;
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        .social-btn:hover {
            background: #333;
        }

        .arts-preview {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }
        .arts-preview h3 {
            font-size: 20px;
            margin-bottom: 15px;
        }
        .arts-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .arts-preview-grid .art-thumb {
            background: #0E0E0E;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .arts-preview-grid .art-thumb:hover {
            transform: scale(1.03);
            border-color: var(--accent-color);
        }
        .arts-preview-grid .art-thumb img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .arts-preview-grid .art-thumb .art-caption {
            padding: 8px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
        .arts-preview .view-all-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .arts-preview .view-all-btn:hover {
            background: var(--accent-hover);
        }

        .shop-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            max-width: 300px;
        }
        .shop-btn:hover {
            background: var(--accent-hover);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--accent-color);
        }
        .back-link::before {
            content: '← ';
        }

        @media (max-width: 768px) {
            .vtuber-detail {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .vtuber-photo {
                height: 280px;
            }
            .vtuber-name-big {
                font-size: 28px;
            }
            .arts-preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
        @media (max-width: 480px) {
            .vtuber-photo {
                height: 220px;
            }
            .arts-preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .arts-preview-grid .art-thumb img {
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><div class="logo-dot"></div>VTUBER HUB</a>
            <button class="nav-toggle" aria-label="Меню">☰</button>
            <nav></nav>
        </div>
    </header>
    <main>
        <!-- Кнопка "← Все втуберы" ведёт на wiki.html -->
        <a href="wiki.html" class="back-link">Все втуберы</a>

        <div id="vtuber-content">
            <p style="text-align:center; color: var(--text-muted); padding: 40px 0;">Загрузка...</p>
        </div>
    </main>
    <footer>
        <p>Контакты для связи: support@vtuberhub.com | Telegram: @vtuberhub_support</p>
        <p style="margin-top: 10px; font-size: 12px; color: #555;">© 2026 VTuber Hub. Все права защищены.</p>
    </footer>
    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vtuberId = urlParams.get('id');

        function renderVtuber() {
            const vtubers = getVtubers();
            const vtuber = vtubers.find(v => v.id === vtuberId);
            const container = document.getElementById('vtuber-content');

            if (!vtuber) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 60px 0;">
                        <h2 style="color: var(--text-muted);">Втубер не найден</h2>
                        <a href="wiki.html" class="btn-primary" style="margin-top:20px;">Вернуться в вики</a>
                    </div>
                `;
                return;
            }

            const allArts = getArts();
            const arts = allArts.filter(a => a.streamerId === vtuber.id);
            const previewArts = arts.slice(0, 4);

            let artsHtml = '';
            if (arts.length === 0) {
                artsHtml = '<p style="color: var(--text-muted);">Арты пока не добавлены.</p>';
            } else {
                artsHtml = `
                    <div class="arts-preview-grid">
                        ${previewArts.map(a => `
                            <div class="art-thumb" onclick="window.location.href='gallery.html?id=${vtuber.id}'">
                                <img src="${a.imageUrl}" alt="${a.caption}">
                                <div class="art-caption">${a.caption || 'Арт'}</div>
                            </div>
                        `).join('')}
                    </div>
                    <a href="gallery.html?id=${vtuber.id}" class="view-all-btn">Смотреть все арты (${arts.length})</a>
                `;
            }

            container.innerHTML = `
                <div class="vtuber-detail">
                    <div class="vtuber-photo">
                        <img src="${vtuber.photo}" alt="${vtuber.name}">
                    </div>
                    <div class="vtuber-info">
                        <h1 class="vtuber-name-big">${vtuber.name}</h1>
                        <div class="vtuber-desc-big">${vtuber.desc}</div>
                        <div style="font-weight: 600; font-size: 14px;">Официальные каналы:</div>
                        <div class="social-links">
                            <a href="https://youtube.com" target="_blank" class="social-btn">YouTube</a>
                            <a href="https://twitter.com" target="_blank" class="social-btn">Twitter / X</a>
                            <a href="https://twitch.tv" target="_blank" class="social-btn">Twitch</a>
                        </div>
                        <div style="margin-top: 10px;">
                            <a href="shop.html?streamer=${vtuber.id}" class="shop-btn">Перейти к мерчу стримера</a>
                        </div>
                    </div>
                </div>
                <div class="arts-preview">
                    <h3>Галерея артов</h3>
                    ${artsHtml}
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', renderVtuber);
    </script>
</body>
</html>
